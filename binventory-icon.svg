<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" rx="20" fill="#0f1117"/>
  <!-- Bin body -->
  <path d="M11 46 L13 87 L87 87 L89 46 Z" fill="#2c2c36" stroke="#3a3a46" stroke-width="1.5"/>
  <!-- Body ribs -->
  <line x1="36" y1="48" x2="36" y2="85" stroke="#1e1e28" stroke-width="2"/>
  <line x1="64" y1="48" x2="64" y2="85" stroke="#1e1e28" stroke-width="2"/>
  <!-- Floor line -->
  <line x1="14" y1="85" x2="86" y2="85" stroke="#1a1a22" stroke-width="3"/>
  <!-- Lid -->
  <rect x="7" y="25" width="86" height="23" rx="5" fill="#FFD600" stroke="#D4A800" stroke-width="1.5"/>
  <!-- Lid sheen -->
  <rect x="11" y="28" width="78" height="8" rx="3" fill="#fff" opacity="0.25"/>
  <!-- Lid shadow bottom -->
  <line x1="8" y1="47" x2="92" y2="47" stroke="#A07800" stroke-width="1.5"/>
  <!-- Handle -->
  <rect x="31" y="9" width="38" height="18" rx="5" fill="#D4A800" stroke="#A07800" stroke-width="1.5"/>
  <rect x="35" y="12" width="30" height="7" rx="3" fill="#FFD600" opacity="0.5"/>
  <!-- Left latch -->
  <rect x="3" y="30" width="7" height="13" rx="2.5" fill="#D4A800" stroke="#A07800" stroke-width="1"/>
  <!-- Right latch -->
  <rect x="90" y="30" width="7" height="13" rx="2.5" fill="#D4A800" stroke="#A07800" stroke-width="1"/>
</svg>
